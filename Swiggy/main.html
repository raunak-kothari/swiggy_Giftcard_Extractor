<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Voucher Code Extractor</title>
<style>
    body {
        font-family: Arial;
        padding: 20px;
        background: #f4f4f4;
    }
    textarea {
        width: 100%;
        height: 200px;
        margin-bottom: 15px;
        padding: 10px;
    }
    button {
        padding: 10px 15px;
        margin: 5px;
        cursor: pointer;
    }
    table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 15px;
        background: white;
    }
    th, td {
        border: 1px solid #ccc;
        padding: 10px;
        text-align: center;
    }
    th {
        background: #333;
        color: white;
    }
</style>
</head>
<body>

<h2>Voucher Code & PIN Extractor</h2>

<textarea id="inputText" placeholder="Paste your voucher text here..."></textarea>

<br>
<button onclick="extractData()">Extract</button>
<button onclick="copyCodes()">Copy Codes</button>
<button onclick="copyPins()">Copy PINs</button>

<table id="resultTable">
    <thead>
        <tr>
            <th>Voucher Code</th>
            <th>PIN</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script>
let codes = [];
let pins = [];

function extractData() {
    const text = document.getElementById("inputText").value;

    // Extract using regex
    codes = [...text.matchAll(/Voucher Code:\s*([A-Z0-9]+)/g)].map(m => m[1]);
    pins = [...text.matchAll(/PIN:\s*(\d+)/g)].map(m => m[1]);

    const tableBody = document.querySelector("#resultTable tbody");
    tableBody.innerHTML = "";

    for (let i = 0; i < Math.min(codes.length, pins.length); i++) {
        let row = `<tr>
            <td>${codes[i]}</td>
            <td>${pins[i]}</td>
        </tr>`;
        tableBody.innerHTML += row;
    }
}

function copyCodes() {
    navigator.clipboard.writeText(codes.join("\n"));
    alert("Codes copied!");
}

function copyPins() {
    navigator.clipboard.writeText(pins.join("\n"));
    alert("PINs copied!");
}
</script>

</body>
</html>
